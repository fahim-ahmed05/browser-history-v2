body:
  - type: dropdown
    attributes:
      name: default_browser
      label: Default Browser
      defaultValue: Chrome
      description: Select the primary browser to search when "Search Across All Browsers" is disabled.
      options:
        - Chrome
        - Firefox
        - Firefox Nightly
        - Edge
        - Brave
        - Brave Nightly
        - Opera
        - Vivaldi
        - Arc
        - Zen
        - Floorp
        - Thorium
        - Helium
        - Waterfox
        - Chromium Profile
        - Firefox Profile
  - type: checkbox
    attributes:
      name: profile_last_updated
      label: Auto-Detect Active Profile (Automatically selects the most recently modified browser profile)
      defaultValue: 'true'
  - type: inputWithFolderBtn
    attributes:
      name: custom_profile_path
      label: Custom Profile Directory
      defaultValue: ''
      description: Required only if a custom "Chromium Profile" or "Firefox Profile" is selected above.
  - type: checkbox
    attributes:
      name: all_browsers_history
      label: Search Across All Browsers (Combines and deduplicates history from all supported browsers)
      defaultValue: 'true'
  - type: input
    attributes:
      name: history_limit
      label: History Limit (Per Browser)
      defaultValue: '1000'
      description: Maximum number of recent history entries to retrieve per browser. Default is 1000.
  - type: textarea
    attributes:
      name: blocked_domains
      label: Blocked Domains
      defaultValue: ''
      description: Comma-separated list of domains to hide from search results (e.g., facebook.com, twitter.com).