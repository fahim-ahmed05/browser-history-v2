body:
  - type: dropdown
    attributes:
      name: default_browser
      label: Browser Selection
      defaultValue: All Browsers
      description: Select 'All Browsers' to search every supported browser, a specific browser, or a 'Custom Profile'.
      options:
        - All Browsers
        - Chrome
        - Firefox
        - Firefox Nightly
        - Edge
        - Brave
        - Brave Nightly
        - Opera
        - Vivaldi
        - Arc
        - Zen
        - Floorp
        - Thorium
        - Helium
        - Waterfox
        - Custom Profile
  - type: dropdown
    attributes:
      name: profile_search_mode
      label: Profile Search Mode
      defaultValue: Active Profile
      description: Choose how the plugin handles multiple profiles within a browser.
      options:
        - Active Profile
        - All Profiles
  - type: inputWithFolderBtn
    attributes:
      name: custom_profile_path
      label: Custom Profile Directory
      defaultValue: ''
      description: Required only if "Custom Profile" is selected, or if you want to include a custom profile with "All Browsers".
  - type: input
    attributes:
      name: history_limit
      label: History Limit
      defaultValue: '1000'
      description: Maximum number of recent history entries to retrieve per browser profile.
  - type: textarea
    attributes:
      name: blocked_domains
      label: Blocked Domains
      defaultValue: ''
      description: Comma-separated list of domains to hide from search results (e.g., facebook.com, twitter.com).